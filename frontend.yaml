# 🔥 NGINX ERROR DEBUGGING (REAL ISSUE I FACED)

# ❗ Problem:
# - Nginx failed to start/restart
# - Error: "host not found in upstream" / config error
# - Even after changing in VS Code, server still had old/broken config

# 🔍 Root Cause:
# - Wrong or invalid nginx.conf present in server
# - Example mistake: catalogue..vkdevin.online (extra dot)
# - Nginx will NOT start if config has even one small error

# 🛠️ How I Debugged:

# 1. Check nginx status
# sudo systemctl status nginx

# 2. Find exact error
# sudo nginx -t

# 👉 This command shows:
# - exact error
# - file path
# - line number

# 3. Fix directly in server using vim
# sudo vim /etc/nginx/nginx.conf

# 👉 Example fix:
# catalogue..vkdevin.online ❌
# catalogue.vkdevin.online ✅

# 4. Test again
# sudo nginx -t

# 👉 Must show:
# "syntax is ok"
# "test is successful"

# 5. Restart nginx
# sudo systemctl restart nginx

# ✅ After this nginx will start successfully

# 💡 Important Learning:
# - nginx will fail even for small mistakes (extra dot, missing ;)
# - always run 'nginx -t' before restart
# - vim fix works immediately because it edits actual server file.